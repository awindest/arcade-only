<!DOCTYPE html>
<html>

<head>
    <style>
        body {
            justify-content: center;
            align-items: center;
            background: darkblue;
            color: white;
            font-family: fantasy;
        }

        #gameDiv {
            text-align: center;
        }

        canvas {
            box-shadow: 8px 8px 16px 0 rgba(0, 0, 0, 0.8);
            border: 4px solid #FFFFFF;
        }

        button {
            font-family: fantasy;
            font-size: 16px;
            background-color: lightgreen;
            color: black;
            margin: 8px;
            border-color: lightgray;
            border-width: 4px;
            border-radius: 8px;
            padding: 8px;

        }

        button:hover {
            background-color: grey;
        }

        #controlPanel {
            background-color: #717171;
            margin: 4px;
            text-align: center;
        }



        /* hack to support real-time scaling */
        #gameDiv {

            /* width: 240px;
            height: 180px; */
            width: 640px;
            height: 480px;
            overflow: hidden;
            position: relative;
            /* Add this line */
            margin: auto;
            /* Center in the case where body cannot be made into a flex container */
        }

        #gameCanvas {
            /*  transform: scale(0.33333);Scale down to 1/4 of original size */
            position: absolute;
            /* Add this line */
            transform-origin: 0 0;
            /* Add this line */
            top: 0;
            /* Add this line */
            left: 0;
            /* Add this line */
        }

        /* end hack to support real-time scaling */
    </style>
</head>

<body>

    <div id="controlPanel" style="border: 2px solid #000000;">
        <!-- Start button -->
        <button id="startButton">START</button>
    </div>
    <br>
    <div id="gameDiv">
        <canvas id="gameCanvas" width="640" height="480"></canvas>
    </div>
    <script src="script.js"></script>

</body>

</html>
